{% extends 'base.html' %}
{% load static %}

{% block title %}Register as Equipment Owner - GreenGear{% endblock %}

{% block content %}
<div class="form-container">
    <h2 class="form-title">Register as Equipment Owner</h2>
    
    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label class="form-label" for="name">Full Name</label>
            <input type="text" class="form-control" id="name" name="name" required>
        </div>
        
        <div class="form-group">
            <label class="form-label" for="phone">Phone Number</label>
            <input type="tel" class="form-control" id="phone" name="phone" pattern="[0-9]{10}" required>
        </div>
        
        <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input type="email" class="form-control" id="email" name="email" required>
        </div>
        
        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" class="form-control" id="password" name="password" required>
        </div>
        
        <div class="form-group">
            <label class="form-label" for="workshop_name">Workshop/Shop Name</label>
            <input type="text" class="form-control" id="workshop_name" name="workshop_name" required>
        </div>
        
        <div class="form-group">
            <label class="form-label" for="address">Address</label>
            <textarea class="form-control" id="address" name="address" rows="3" required></textarea>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">Register as Equipment Owner</button>
    </form>
    
    <div style="text-align: center; margin-top: 20px;">
        <p>Already have an account? <a href="{% url 'users:login' %}">Login here</a></p>
        <p>Want to register as Farmer? <a href="{% url 'users:register_farmer' %}">Click here</a></p>
    </div>
</div>
{% endblock %}
